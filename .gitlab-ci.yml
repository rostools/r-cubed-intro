image: rocker/tidyverse

stages:
  - build
  - deploy

build:
    stage: build
    script:
        - R -e "remotes::install_deps(dependencies = c('Depends', 'Imports'))"
        - Rscript _build.R
    only:
        - v2
    artifacts:
        paths:
            - public

deploy:
    image: node:latest
    stage: deploy
    before_script:
        - npm install netlify-cli
    script:
        - npx netlify deploy --site=$NETLIFY_SITE_ID_V2 --dir public --prod
    only:
        - v2
    dependencies:
        - build
